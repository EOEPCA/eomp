$schema: 'https://json-schema.org/draft/2020-12/schema'
$id: 'https://raw.githubusercontent.com/EOEPCA/eomp/refs/heads/master/schemas/resourceRecordGeoJSON.yaml'
title: EOEPCA metadata profile
description: EOEPCA metadata profile

allOf:
  - $ref: 'https://raw.githubusercontent.com/opengeospatial/ogcapi-records/refs/tags/1.0.0/core/openapi/schemas/recordGeoJSON.yaml'
  - type: object
    properties:
      conformsTo:
        type: array
        contains:
          const: http://eoepca.org/spec/eomp/1/conf/core
      properties:
          type: object
          properties:
              type:
                  type: string
                  description: EOEPCA resource type
                  enum:
                      - dataset
                      - service
                      - process
                      - workflow
          required:
              - type
    required:
        - links
